  <style>

:root {
  --bg-1: #f5f8ff;
  --bg-2: #edf5ff;
  --bg-3: #f9fbff;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-strong: rgba(255, 255, 255, 0.88);
  --surface-soft: rgba(247, 250, 255, 0.9);
  --line: rgba(116, 146, 188, 0.22);
  --line-strong: rgba(110, 139, 180, 0.34);
  --text: #18324f;
  --text-soft: #667b96;
  --accent: #6f8fe8;
  --accent-strong: #5677d8;
  --accent-soft: #eef3ff;
  --mint: #8fd7c8;
  --mint-soft: #e8fbf5;
  --lavender: #cab8ff;
  --danger: #d96a7a;
  --danger-soft: #fff0f3;
  --success: #35a873;
  --success-soft: #ecfff5;
  --shadow-xl: 0 32px 80px rgba(92, 115, 145, 0.22);
  --shadow-md: 0 14px 34px rgba(101, 123, 160, 0.14);
  --radius-xl: 32px;
  --radius-lg: 24px;
  --radius-md: 18px;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 18%, rgba(202, 184, 255, 0.42), transparent 28%),
    radial-gradient(circle at 88% 18%, rgba(143, 215, 200, 0.34), transparent 24%),
    radial-gradient(circle at 18% 90%, rgba(163, 196, 255, 0.25), transparent 26%),
    linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
  overflow: hidden;
}
body::before,
body::after {
  content: "";
  position: fixed;
  inset: auto;
  pointer-events: none;
  filter: blur(80px);
  opacity: 0.55;
}
body::before {
  width: 260px;
  height: 260px;
  top: 6%;
  right: 7%;
  border-radius: 50%;
  background: rgba(111, 143, 232, 0.25);
}
body::after {
  width: 260px;
  height: 260px;
  left: 5%;
  bottom: 5%;
  border-radius: 50%;
  background: rgba(143, 215, 200, 0.2);
}
button { font: inherit; }
.app-shell {
  min-height: 100dvh;
  padding: clamp(16px, 3vw, 30px);
  display: grid;
  place-items: center;
}
.view {
  width: min(980px, 100%);
  display: grid;
  place-items: center;
  animation: fadeUp 0.46s cubic-bezier(.2,.8,.2,1);
}
.frame {
  width: 100%;
  max-height: calc(100dvh - 34px);
  min-height: min(760px, calc(100dvh - 34px));
  padding: clamp(18px, 2.4vw, 28px);
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.85);
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  display: grid;
  gap: clamp(12px, 1.8vh, 18px);
  overflow: hidden;
  position: relative;
}
.frame::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04));
  pointer-events: none;
}
.frame > * { position: relative; z-index: 1; }
.quiz-frame {
  grid-template-rows: minmax(120px, 0.9fr) minmax(250px, 1.52fr) auto auto auto auto;
}
.question-card {
  min-height: clamp(132px, 18vh, 220px);
  max-height: none;
  padding: clamp(20px, 3vh, 30px);
  padding-right: clamp(52px, 5vw, 68px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,255,0.88));
  border: 1px solid rgba(130, 156, 196, 0.2);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), var(--shadow-md);
  font-size: clamp(1.24rem, 2.18vw, 1.9rem);
  font-weight: 760;
  line-height: 1.28;
  overflow: visible;
  position: relative;
}
.question-text {
  display: block;
  width: 100%;
  max-height: none;
  overflow: visible;
  padding-inline: clamp(10px, 2vw, 24px);
}
.question-card.q-long {
  font-size: clamp(1.03rem, 1.62vw, 1.46rem);
  line-height: 1.24;
  padding-top: clamp(16px, 2.2vh, 24px);
  padding-bottom: clamp(16px, 2.2vh, 24px);
}
.question-card.q-very-long {
  font-size: clamp(0.92rem, 1.32vw, 1.17rem);
  line-height: 1.2;
  padding-top: clamp(13px, 1.8vh, 18px);
  padding-bottom: clamp(13px, 1.8vh, 18px);
}
.question-card.q-very-long .question-text {
  padding-inline: clamp(4px, 1.2vw, 14px);
}
.source-badge {
  position: absolute;
  top: clamp(12px, 1.7vh, 16px);
  right: clamp(12px, 1.7vh, 16px);
  width: 28px;
  height: 28px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: rgba(237, 242, 255, 0.92);
  border: 1px solid rgba(111, 143, 232, 0.24);
  color: var(--accent-strong);
  font-size: 0.84rem;
  font-weight: 850;
  cursor: help;
  z-index: 5;
  box-shadow: 0 8px 18px rgba(100, 124, 170, 0.12);
  outline: none;
}
.source-badge:focus {
  box-shadow: 0 0 0 4px rgba(111, 143, 232, 0.15), 0 8px 18px rgba(100, 124, 170, 0.12);
}
.source-tooltip {
  position: absolute;
  top: 36px;
  right: 0;
  width: max-content;
  max-width: min(360px, 72vw);
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(24, 50, 79, 0.96);
  color: #fff;
  font-size: 0.77rem;
  font-weight: 650;
  line-height: 1.32;
  text-align: left;
  box-shadow: 0 18px 40px rgba(24, 50, 79, 0.18);
  opacity: 0;
  transform: translateY(-4px) scale(0.98);
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.source-tooltip::before {
  content: "";
  position: absolute;
  top: -6px;
  right: 10px;
  width: 12px;
  height: 12px;
  background: rgba(24, 50, 79, 0.96);
  transform: rotate(45deg);
}
.source-badge:hover .source-tooltip,
.source-badge:focus .source-tooltip,
.source-badge:focus-within .source-tooltip {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.question-card.ready-next {
  cursor: pointer;
  outline: 2px solid rgba(111, 143, 232, 0.22);
  animation: pulseSoft 1.7s ease-in-out infinite;
}
.answers {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(112px, 1fr));
  gap: clamp(10px, 1.5vh, 14px);
}
.answer {
  min-width: 0;
  min-height: 0;
  border: 1px solid rgba(124, 152, 192, 0.18);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,248,255,0.92));
  color: var(--text);
  overflow: hidden;
  text-align: left;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(117, 136, 171, 0.1);
  transition: transform 0.24s cubic-bezier(.2,.8,.2,1), box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease, opacity 0.24s ease;
}
.answer:hover {
  transform: translateY(-3px);
  border-color: rgba(111, 143, 232, 0.42);
  box-shadow: 0 20px 34px rgba(115, 132, 168, 0.16);
}
.answer:active { transform: translateY(-1px) scale(0.995); }
.answer-inner {
  height: 100%;
  display: grid;
  grid-template-columns: 48px minmax(0, 1fr);
  gap: 14px;
  align-items: center;
  padding: clamp(14px, 1.9vh, 18px);
}
.answer-key {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, #edf2ff, #e7efff);
  color: var(--accent-strong);
  font-weight: 800;
  font-size: 1rem;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
.answer-text {
  max-height: 100%;
  overflow: auto;
  font-size: clamp(0.97rem, 1.35vw, 1.06rem);
  line-height: 1.36;
  padding-right: 4px;
}
.answer.correct {
  background: linear-gradient(180deg, rgba(236,255,245,0.97), rgba(229,252,241,0.92));
  border-color: rgba(53,168,115,0.42);
}
.answer.correct .answer-key {
  background: linear-gradient(180deg, rgba(53,168,115,0.96), rgba(40,149,101,0.96));
  color: #fff;
}
.answer.wrong {
  background: linear-gradient(180deg, rgba(255,240,243,0.98), rgba(255,233,238,0.94));
  border-color: rgba(217,106,122,0.42);
}
.answer.wrong .answer-key {
  background: linear-gradient(180deg, rgba(217,106,122,0.96), rgba(198,89,105,0.96));
  color: #fff;
}
.answer.dim { opacity: 0.62; }
.feedback-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}
.feedback {
  min-height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-radius: 18px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.62);
  border: 1px solid rgba(124, 152, 192, 0.14);
  color: var(--text-soft);
  font-size: 0.97rem;
  line-height: 1.35;
}
.feedback.is-correct {
  color: #1e7c56;
  background: rgba(236,255,245,0.88);
  border-color: rgba(53,168,115,0.22);
}
.feedback.is-wrong {
  color: #b24b5c;
  background: rgba(255,240,243,0.9);
  border-color: rgba(217,106,122,0.24);
}
.feedback.result-feedback {
  animation: fadeUp 0.24s cubic-bezier(.2,.8,.2,1);
  font-weight: 650;
}
.stats-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.stat-chip {
  min-width: 116px;
  padding: 11px 14px;
  background: rgba(255,255,255,0.68);
  border: 1px solid rgba(125, 150, 189, 0.14);
  border-radius: 18px;
  display: grid;
  gap: 4px;
  text-align: center;
  box-shadow: 0 8px 18px rgba(125, 143, 177, 0.08);
}
.stat-label {
  color: var(--text-soft);
  font-size: 0.77rem;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.stat-value {
  color: var(--text);
  font-size: 1.03rem;
  font-weight: 780;
}
.actions-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.mode-selector {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.btn,
.mode-btn {
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  transition: transform 0.22s cubic-bezier(.2,.8,.2,1), box-shadow 0.22s ease, background 0.22s ease, color 0.22s ease, opacity 0.22s ease;
}
.btn:hover,
.mode-btn:hover { transform: translateY(-2px); }
.btn:active,
.mode-btn:active { transform: translateY(0); }
.btn {
  padding: 12px 18px;
  font-weight: 720;
}
.btn-primary {
  background: linear-gradient(180deg, #6f8fe8, #5c7fdf);
  color: #fff;
  box-shadow: 0 14px 28px rgba(95, 126, 223, 0.28);
}
.btn-primary:disabled {
  opacity: 0.45;
  box-shadow: none;
  cursor: not-allowed;
}
.btn-soft {
  background: rgba(255,255,255,0.92);
  color: var(--text);
  box-shadow: 0 10px 24px rgba(125, 143, 177, 0.12);
}
.btn-ghost {
  background: rgba(239,244,255,0.92);
  color: var(--accent-strong);
}
.btn-tertiary {
  background: transparent;
  color: var(--text-soft);
  border: 1px solid rgba(124, 152, 192, 0.24);
}
.mode-btn {
  padding: 13px 14px;
  background: rgba(255,255,255,0.6);
  color: var(--text);
  font-weight: 740;
  border: 1px solid rgba(124, 152, 192, 0.16);
}
.mode-btn.active {
  background: linear-gradient(180deg, rgba(111,143,232,0.98), rgba(92,127,223,0.98));
  color: #fff;
  box-shadow: 0 14px 28px rgba(95, 126, 223, 0.26);
}
.tiny-note {
  text-align: center;
  color: var(--text-soft);
  font-size: 0.84rem;
}
.result-frame {
  grid-template-rows: auto auto auto auto minmax(0, 1fr);
}
.result-hero {
  display: grid;
  gap: 8px;
  justify-items: center;
  text-align: center;
}
.result-kicker {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.68);
  color: var(--text-soft);
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.result-score {
  display: flex;
  align-items: baseline;
  gap: 8px;
  color: var(--text);
}
.result-score strong {
  font-size: clamp(3rem, 7vw, 4.8rem);
  line-height: 1;
}
.result-score span {
  font-size: clamp(1.2rem, 2vw, 1.6rem);
  color: var(--text-soft);
  font-weight: 700;
}
.result-subtitle {
  margin: 0;
  color: var(--text-soft);
}
.review-block {
  min-height: 0;
  overflow: auto;
  background: rgba(255,255,255,0.52);
  border: 1px solid rgba(124, 152, 192, 0.12);
  border-radius: 24px;
  padding: 18px;
}
.review-block h2 {
  margin: 0 0 12px;
  text-align: center;
  font-size: 1rem;
  color: var(--text-soft);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.miss {
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(124, 152, 192, 0.12);
  border-radius: 20px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 10px 20px rgba(125, 143, 177, 0.08);
}
.miss p {
  margin: 0 0 8px;
  line-height: 1.36;
  font-weight: 650;
}
.miss small {
  display: block;
  line-height: 1.4;
  color: var(--text-soft);
}
.error-card {
  max-width: 920px;
  max-height: calc(100dvh - 36px);
  overflow: auto;
  background: rgba(255,255,255,0.82);
}
.error-card h1 {
  margin: 0;
  text-align: center;
}
.error-card pre {
  white-space: pre-wrap;
  word-break: break-word;
  background: rgba(245,248,255,0.95);
  border-radius: 18px;
  border: 1px solid rgba(124, 152, 192, 0.14);
  padding: 14px;
  color: var(--text-soft);
  overflow: auto;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(120, 146, 190, 0.32);
  border-radius: 999px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulseSoft {
  0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 0 rgba(111,143,232,0.1); }
  50% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 8px rgba(111,143,232,0); }
}
@media (max-height: 800px) and (min-width: 901px) {
  .frame { max-height: calc(100dvh - 24px); min-height: auto; padding: 16px; }
  .quiz-frame { grid-template-rows: minmax(96px, 0.76fr) minmax(210px, 1.3fr) auto auto auto auto; }
  .question-card { min-height: 120px; }
  .answer-inner { padding: 12px 14px; gap: 12px; }
  .stat-chip { padding: 10px 13px; }
  .btn, .mode-btn { padding-top: 11px; padding-bottom: 11px; }
}
@media (max-width: 900px) {
  body { overflow: auto; }
  .app-shell { min-height: 100dvh; padding: 14px; }
  .frame { max-height: none; min-height: auto; }
  .quiz-frame, .result-frame { grid-template-rows: auto auto auto auto auto auto; }
  .answers { grid-template-columns: 1fr; grid-template-rows: none; }
  .answer { min-height: 110px; }
  .mode-selector { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .mode-selector { grid-template-columns: 1fr; }
  .actions-row { flex-direction: column; }
  .btn, .mode-btn { width: 100%; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
}

  </style>

  const TEST_SIZE = 40;
  const MODE_LABELS = { general: "General", tema1: "Tema 1", tema2: "Tema 2", tema3: "Tema 3" };
  const MODE_TEMA = { tema1: 1, tema2: 2, tema3: 3 };
  const LETTERS = ["A", "B", "C", "D"];

  const storage = (() => {
    try {
      const key = "__quiz_storage_test__";
      localStorage.setItem(key, "1");
      localStorage.removeItem(key);
      return localStorage;
    } catch (_) {
      return null;
    }
  })();

  const state = {
    selectedMode: "general",
    currentTest: [],
    currentIndex: 0,
    answered: false,
    selectedKey: null,
    score: 0,
    correct: 0,
    wrong: 0,
    answers: [],
    startedAt: 0,
    elapsed: 0,
    timer: null,
    bestScores: loadBestScores(),
    cycleUsed: { general: new Set(), tema1: new Set(), tema2: new Set(), tema3: new Set() },
    error: null,
    finished: false
  };

  function normalizeQuestion(text) {
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9ñ]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function questionUniqueKey(q) {
    return q.duplicateGroup || normalizeQuestion(q.question);
  }

  function uniqueByQuestionText(questions) {
    const seen = new Set();
    const result = [];
    for (const q of questions) {
      const n = questionUniqueKey(q);
      if (!n || seen.has(n)) continue;
      seen.add(n);
      result.push(q);
    }
    return result;
  }

  function trustedPool() {
    return uniqueByQuestionText(QUESTIONS.filter(q => q.trusted === true && LETTERS.includes(q.correctKey)));
  }

  function poolForMode(mode) {
    const pool = trustedPool();
    if (mode === "general") return pool;
    const tema = MODE_TEMA[mode];
    return pool.filter(q => q.tema === tema);
  }

  function shuffle(array) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateTest(mode) {
    const pool = poolForMode(mode);
    if (pool.length < TEST_SIZE) {
      return {
        error: `No hay suficientes preguntas fiables para ${MODE_LABELS[mode]}. Disponibles: ${pool.length}. Necesarias: ${TEST_SIZE}.`
      };
    }
    const used = state.cycleUsed[mode];
    let available = pool.filter(q => !used.has(questionUniqueKey(q)));
    if (available.length < TEST_SIZE) {
      used.clear();
      available = pool.slice();
    }
    const selected = shuffle(available).slice(0, TEST_SIZE);
    for (const q of selected) used.add(questionUniqueKey(q));
    return { questions: selected };
  }

  function startNewTest(mode = state.selectedMode) {
    state.selectedMode = mode;
    const generated = generateTest(mode);
    if (generated.error) {
      stopTimer();
      state.error = generated.error;
      state.currentTest = [];
      state.finished = false;
      render();
      return;
    }
    state.error = null;
    state.currentTest = generated.questions;
    resetRunState();
    startTimer();
    render();
  }

  function restartCurrentTest() {
    if (!state.currentTest.length) {
      startNewTest(state.selectedMode);
      return;
    }
    state.error = null;
    resetRunState();
    startTimer();
    render();
  }

  function restartCycle() {
    state.cycleUsed[state.selectedMode].clear();
    startNewTest(state.selectedMode);
  }

  function resetRunState() {
    state.currentIndex = 0;
    state.answered = false;
    state.selectedKey = null;
    state.score = 0;
    state.correct = 0;
    state.wrong = 0;
    state.answers = [];
    state.finished = false;
    state.elapsed = 0;
    state.startedAt = Date.now();
  }

  function answer(key) {
    if (state.error || state.finished || !state.currentTest.length) return;
    if (state.answered) {
      nextQuestion();
      return;
    }
    const q = state.currentTest[state.currentIndex];
    if (!q || !LETTERS.includes(key)) return;
    const isCorrect = key === q.correctKey;
    state.answered = true;
    state.selectedKey = key;
    if (isCorrect) {
      state.score += 1;
      state.correct += 1;
    } else {
      state.wrong += 1;
    }
    state.answers[state.currentIndex] = {
      id: q.id,
      question: q.question,
      selectedKey: key,
      correctKey: q.correctKey,
      selectedText: optionText(q, key),
      correctText: optionText(q, q.correctKey),
      isCorrect
    };
    render();
  }

  function nextQuestion() {
    if (!state.answered) return;
    if (state.currentIndex >= TEST_SIZE - 1) {
      finishTest();
      return;
    }
    state.currentIndex += 1;
    state.answered = false;
    state.selectedKey = null;
    render();
  }

  function finishTest() {
    stopTimer();
    state.finished = true;
    state.answered = false;
    state.selectedKey = null;
    updateBestScore();
    render();
  }

  function optionText(q, key) {
    const opt = q.options.find(o => o.key === key);
    return opt ? opt.text : "";
  }

  function percent() {
    return Math.round((state.score / TEST_SIZE) * 100);
  }

  function formatTime(seconds) {
    const s = Math.max(0, Math.floor(seconds));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const r = s % 60;
    const mm = String(m).padStart(2, "0");
    const ss = String(r).padStart(2, "0");
    return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  
function startTimer() {
    stopTimer();
    state.startedAt = Date.now();
    state.elapsed = 0;
    state.timer = setInterval(() => {
      state.elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
      document.querySelectorAll('[data-time-stat]').forEach((node) => {
        node.textContent = formatTime(state.elapsed);
      });
    }, 1000);
  }

  function stopTimer() {
    if (state.timer) clearInterval(state.timer);
    state.timer = null;
    if (state.startedAt && !state.finished) {
      state.elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
    }
  }

  function loadBestScores() {
    if (!storage) return {};
    try {
      return JSON.parse(storage.getItem("matematicasQuizBestScores") || "{}") || {};
    } catch (_) {
      return {};
    }
  }

  function saveBestScores() {
    if (!storage) return;
    try {
      storage.setItem("matematicasQuizBestScores", JSON.stringify(state.bestScores));
    } catch (_) {}
  }

  function updateBestScore() {
    const mode = state.selectedMode;
    const current = { score: state.score, time: state.elapsed, date: new Date().toISOString() };
    const previous = state.bestScores[mode];
    if (!previous || current.score > previous.score || (current.score === previous.score && current.time < previous.time)) {
      state.bestScores[mode] = current;
      saveBestScores();
    }
  }

  function bestLabel(mode = state.selectedMode) {
    const best = state.bestScores[mode];
    return best ? `${best.score}/${TEST_SIZE}` : "—";
  }

  function validateData() {
    const problems = [];
    QUESTIONS.forEach((q, i) => {
      if (![1,2,3].includes(q.tema)) problems.push(`Pregunta ${i + 1}: tema inválido.`);
      if (!Array.isArray(q.options) || q.options.length !== 4) problems.push(`Pregunta ${i + 1}: no tiene cuatro opciones.`);
      if (q.trusted === true && !LETTERS.includes(q.correctKey)) problems.push(`Pregunta ${i + 1}: pregunta fiable sin correctKey válido.`);
    });
    const counts = {
      general: poolForMode("general").length,
      tema1: poolForMode("tema1").length,
      tema2: poolForMode("tema2").length,
      tema3: poolForMode("tema3").length
    };
    for (const [mode, count] of Object.entries(counts)) {
      if (count < TEST_SIZE) problems.push(`${MODE_LABELS[mode]}: solo hay ${count} preguntas fiables únicas.`);
    }
    return { ok: problems.length === 0, problems, counts };
  }

  

  function renderStats() {
    const qNum = state.finished ? TEST_SIZE : Math.min(state.currentIndex + 1, TEST_SIZE);
    return `
      <div class="stats-row" aria-live="polite">
        <div class="stat-chip"><span class="stat-label">Pregunta</span><span class="stat-value">${qNum}/${TEST_SIZE}</span></div>
        <div class="stat-chip"><span class="stat-label">Correctas</span><span class="stat-value">${state.correct}</span></div>
        <div class="stat-chip"><span class="stat-label">Incorrectas</span><span class="stat-value">${state.wrong}</span></div>
        <div class="stat-chip"><span class="stat-label">Tiempo</span><span class="stat-value" data-time-stat>${formatTime(state.elapsed)}</span></div>
        <div class="stat-chip"><span class="stat-label">Mejor</span><span class="stat-value">${bestLabel()}</span></div>
      </div>
    `;
  }

  function renderModeButtons() {
    return `
      <div class="mode-selector" role="tablist" aria-label="Modo de test">
        ${Object.keys(MODE_LABELS).map(mode => `
          <button class="mode-btn ${state.selectedMode === mode ? "active" : ""}" data-mode="${mode}" type="button">${MODE_LABELS[mode]}</button>
        `).join("")}
      </div>
    `;
  }


  function questionLengthClass(q) {
    const len = String(q?.question || "").length;
    if (len > 245) return " q-very-long";
    if (len > 155) return " q-long";
    return "";
  }

  function sourceLabel(q) {
    return q.sourceRef || q.source || "Fuente no especificada";
  }

  function renderQuiz() {
    const q = state.currentTest[state.currentIndex];
    if (!q) return renderError("No hay pregunta activa.");
    const answered = state.answered;
    const options = q.options.map(opt => {
      let cls = "answer";
      if (answered) {
        if (opt.key === q.correctKey) cls += " correct";
        else if (opt.key === state.selectedKey) cls += " wrong";
        else cls += " dim";
      }
      return `
        <button class="${cls}" data-answer="${opt.key}" type="button" aria-label="Respuesta ${opt.key}">
          <span class="answer-inner">
            <span class="answer-key">${opt.key}</span>
            <span class="answer-text">${escapeHtml(opt.text)}</span>
          </span>
        </button>
      `;
    }).join("");

    const selectedOk = answered && state.selectedKey === q.correctKey;
    const correctAnswerText = `${q.correctKey}) ${escapeHtml(optionText(q, q.correctKey))}`;
    const feedbackHtml = answered
      ? selectedOk
        ? `<div class="feedback result-feedback is-correct" role="status"><strong>Correcta.</strong>&nbsp;${correctAnswerText}</div>`
        : `<div class="feedback result-feedback is-wrong" role="status"><strong>Incorrecta.</strong>&nbsp;La correcta es ${correctAnswerText}</div>`
      : "";

    return `
      <main class="view">
        <section class="frame quiz-frame" aria-label="Test de entrenamiento">
          <div class="question-card ${answered ? "ready-next" : ""}${questionLengthClass(q)}" data-question-card="true">
            <span class="source-badge" data-source-icon tabindex="0" title="${escapeHtml(sourceLabel(q))}" aria-label="Fuente: ${escapeHtml(sourceLabel(q))}">
              ?
              <span class="source-tooltip">${escapeHtml(sourceLabel(q))}</span>
            </span>
            <span class="question-text">${escapeHtml(q.question)}</span>
          </div>
          <div class="answers">${options}</div>
          ${feedbackHtml}
          ${renderStats()}
          <div class="actions-row">
            <button class="btn btn-primary" data-action="new" type="button">Nuevo test</button>
          </div>
          ${renderModeButtons()}
        </section>
      </main>
    `;
  }

  function renderResult() {
    const missed = state.answers.filter(a => !a.isCorrect);
    const missedHtml = missed.length ? missed.map((m, i) => `
      <article class="miss">
        <p><strong>${i + 1}.</strong> ${escapeHtml(m.question)}</p>
        <small>Tu respuesta: ${m.selectedKey}) ${escapeHtml(m.selectedText)}</small>
        <small>Respuesta correcta: ${m.correctKey}) ${escapeHtml(m.correctText)}</small>
      </article>
    `).join("") : `<article class="miss"><p>Sin errores en este test.</p></article>`;

    return `
      <main class="view">
        <section class="frame result-frame" aria-label="Resultados finales">
          <div class="result-hero">
            <span class="result-kicker">Test completado</span>
            <div class="result-score"><strong>${state.score}</strong><span>/ ${TEST_SIZE}</span></div>
            <p class="result-subtitle">${MODE_LABELS[state.selectedMode]} · ${percent()}% de aciertos · ${formatTime(state.elapsed)}</p>
          </div>
          ${renderStats()}
          <div class="actions-row">
            <button class="btn btn-primary" data-action="new" type="button">Nuevo test</button>
          </div>
          ${renderModeButtons()}
          <section class="review-block">
            <h2>Preguntas falladas</h2>
            ${missedHtml}
          </section>
        </section>
      </main>
    `;
  }

  function renderError(message) {
    const validation = validateData();
    const counts = validation.counts || {};
    return `
      <main class="view">
        <section class="frame error-card">
          <h1>No se puede iniciar el test</h1>
          <div class="feedback is-wrong">${escapeHtml(message || state.error || "Error de validación")}</div>
          <pre>${escapeHtml(validation.problems.join("\n") || "Sin detalles adicionales.")}</pre>
          <div class="stats-row">
            <div class="stat-chip"><span class="stat-label">Únicas</span><span class="stat-value">${DATA_META.total}</span></div>
            <div class="stat-chip"><span class="stat-label">Fiables</span><span class="stat-value">${DATA_META.trusted}</span></div>
            <div class="stat-chip"><span class="stat-label">No fiables</span><span class="stat-value">${DATA_META.untrusted}</span></div>
            <div class="stat-chip"><span class="stat-label">Tema 1</span><span class="stat-value">${counts.tema1 || 0}</span></div>
            <div class="stat-chip"><span class="stat-label">Tema 2</span><span class="stat-value">${counts.tema2 || 0}</span></div>
            <div class="stat-chip"><span class="stat-label">Tema 3</span><span class="stat-value">${counts.tema3 || 0}</span></div>
          </div>
          <div class="actions-row">
            <button class="btn btn-primary" data-action="cycle" type="button">Reintentar</button>
          </div>
          ${renderModeButtons()}
        </section>
      </main>
    `;
  }

  function render() {
    const app = document.getElementById("app");
    if (!app) return;
    if (state.error) app.innerHTML = renderError(state.error);
    else if (state.finished) app.innerHTML = renderResult();
    else app.innerHTML = renderQuiz();
  }

function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  document.getElementById("app").addEventListener("click", (event) => {
    const modeButton = event.target.closest("[data-mode]");
    if (modeButton) {
      startNewTest(modeButton.dataset.mode);
      return;
    }
    const answerButton = event.target.closest("[data-answer]");
    if (answerButton) {
      answer(answerButton.dataset.answer);
      return;
    }
    if (event.target.closest("[data-source-icon]")) {
      event.stopPropagation();
      return;
    }
    if (event.target.closest("[data-question-card]")) {
      if (state.answered) nextQuestion();
      return;
    }
    const action = event.target.closest("[data-action]");
    if (!action) return;
    switch (action.dataset.action) {
      case "new": startNewTest(state.selectedMode); break;
      case "restart": restartCurrentTest(); break;
      case "cycle": restartCycle(); break;
      case "next": nextQuestion(); break;
      case "change-mode":
        const firstMode = document.querySelector("[data-mode]");
        if (firstMode) {
          firstMode.focus();
          firstMode.scrollIntoView({ block: "center", behavior: "smooth" });
        }
        break;
    }
  });


  const initialValidation = validateData();
  if (!initialValidation.ok) {
    state.error = initialValidation.problems.join("\n");
    render();
  } else {
    startNewTest("general");
  }
  
  </script>
